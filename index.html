<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>医健企业AI就绪度诊断</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
.wrap{max-width:640px;margin:0 auto;padding:1.5rem 1rem 4rem}

/* 封面 */
.cover{text-align:center;padding:3rem 1rem 2rem}
.cover-tag{display:inline-block;font-size:11px;letter-spacing:.08em;color:#185FA5;background:#E6F1FB;border-radius:20px;padding:4px 14px;margin-bottom:1rem}
.cover h1{font-size:24px;font-weight:500;line-height:1.5;margin-bottom:.75rem;color:#1a1a1a}
.cover p{font-size:14px;color:#666;line-height:1.8;margin-bottom:1.5rem;max-width:480px;margin-left:auto;margin-right:auto}
.cover-meta{display:flex;justify-content:center;gap:1.5rem;margin-bottom:2rem}
.cover-meta span{font-size:13px;color:#999}
.start-btn{display:inline-block;padding:13px 40px;background:#185FA5;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;letter-spacing:.02em}
.start-btn:hover{background:#0C447C}

/* 进度 */
.prog-bar{height:3px;background:#e5e5e5;border-radius:2px;margin-bottom:1.25rem}
.prog-fill{height:100%;background:#378ADD;border-radius:2px;transition:width .4s ease}
.dim-tag{font-size:11px;letter-spacing:.06em;color:#999;text-transform:uppercase;margin-bottom:.5rem}

/* 题卡 */
.q-card{background:#fff;border:1px solid #eee;border-radius:12px;padding:1.5rem}
.q-num{font-size:12px;color:#378ADD;font-weight:500;margin-bottom:.5rem}
.q-text{font-size:16px;font-weight:500;line-height:1.5;margin-bottom:.5rem;color:#1a1a1a}
.q-sub{font-size:13px;color:#666;line-height:1.6;margin-bottom:1.25rem;padding-left:.75rem;border-left:2px solid #B5D4F4}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border:1px solid #eee;border-radius:8px;background:#f9f9f9;cursor:pointer;text-align:left;font-size:13px;color:#1a1a1a;line-height:1.5;transition:all .15s;width:100%}
.opt:hover{border-color:#85B7EB;background:#E6F1FB;color:#0C447C}
.opt.sel{border-color:#378ADD;background:#E6F1FB;color:#0C447C;font-weight:500}
.opt-l{font-size:11px;font-weight:500;color:#999;min-width:16px;padding-top:1px;flex-shrink:0}
.opt.sel .opt-l{color:#185FA5}

/* 导航 */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem}
.nav-l{padding:9px 20px;border:1px solid #ccc;border-radius:8px;font-size:13px;cursor:pointer;background:#fff;color:#1a1a1a}
.nav-l:disabled{opacity:.3;cursor:default}
.nav-r{padding:9px 24px;background:#185FA5;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer}
.nav-r:disabled{opacity:.3;cursor:default}
.nav-r:hover:not(:disabled){background:#0C447C}
.step-ct{font-size:13px;color:#999}

/* 信息表单 */
.info-card{background:#fff;border:1px solid #eee;border-radius:12px;padding:1.75rem}
.info-title{font-size:18px;font-weight:500;margin-bottom:.5rem;color:#1a1a1a}
.info-sub{font-size:13px;color:#666;margin-bottom:1.5rem;line-height:1.7}
.info-row{margin-bottom:1rem}
.info-row label{display:block;font-size:12px;color:#666;margin-bottom:5px}
.info-row input,.info-row select{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;color:#1a1a1a;-webkit-appearance:none}
.info-row input:focus,.info-row select:focus{outline:none;border-color:#378ADD}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.submit-btn{width:100%;padding:13px;background:#185FA5;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;margin-top:.75rem;letter-spacing:.02em}
.submit-btn:hover{background:#0C447C}
.submit-btn:disabled{opacity:.5;cursor:default}
.skip-link{text-align:center;margin-top:.75rem;font-size:12px;color:#999;cursor:pointer;text-decoration:underline}
.submit-status{font-size:13px;color:#999;text-align:center;margin-top:.75rem;min-height:20px}

/* 结果页 */
.result-header{text-align:center;padding:1rem 1rem .75rem}
.result-tag{display:inline-block;font-size:11px;letter-spacing:.08em;color:#185FA5;background:#E6F1FB;border-radius:20px;padding:4px 14px;margin-bottom:.5rem}
.result-name{font-size:20px;font-weight:500;margin-bottom:.4rem;color:#1a1a1a}
.result-desc{font-size:13px;color:#666;line-height:1.7;max-width:480px;margin:0 auto 1rem}
.score-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:.75rem}
.sc-box{background:#fff;border:1px solid #eee;border-radius:8px;padding:8px 6px;text-align:center}
.sc-dim{font-size:10px;color:#666;margin-bottom:3px;line-height:1.4}
.sc-val{font-size:16px;font-weight:500}
.lv0{color:#E24B4A}.lv1{color:#BA7517}.lv2{color:#1D9E75}
.actions-title{font-size:11px;letter-spacing:.06em;color:#999;text-transform:uppercase;margin-bottom:.5rem}
.action-card{background:#fff;border:1px solid #eee;border-radius:10px;margin-bottom:.5rem;overflow:hidden}
.action-header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;cursor:pointer;-webkit-tap-highlight-color:transparent}
.action-header-left{flex:1}
.action-num{font-size:11px;font-weight:500;color:#185FA5;margin-bottom:.2rem}
.action-head{font-size:14px;font-weight:500;color:#1a1a1a;line-height:1.4}
.action-arrow{font-size:12px;color:#999;transition:transform .2s;flex-shrink:0;margin-left:.5rem}
.action-arrow.open{transform:rotate(180deg)}
.action-body{font-size:13px;color:#666;line-height:1.7;padding:0 1rem .75rem;display:none}
.action-body.open{display:block}
.action-card.hook{background:#E6F1FB;border-color:#B5D4F4}
.action-card.hook .action-num{color:#185FA5}
.action-card.hook .action-head{color:#0C447C}
.action-card.hook .action-body{color:#185FA5}
.hook-btn{display:inline-block;margin-top:.75rem;padding:9px 22px;background:#185FA5;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer}
.hook-btn:hover{background:#0C447C}
.score-total{text-align:center;font-size:13px;color:#999;margin-bottom:.6rem}
.score-total strong{color:#185FA5;font-size:15px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:14px;padding:2rem 1.75rem;max-width:340px;width:90%;text-align:center}
.modal-box h3{font-size:17px;font-weight:500;margin-bottom:.75rem}
.modal-box p{font-size:13px;color:#666;line-height:1.8;margin-bottom:1.25rem}
.modal-close{padding:9px 28px;background:#185FA5;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer}
.modal-close:hover{background:#0C447C}
.hidden{display:none}

@media(max-width:480px){
  .info-grid{grid-template-columns:1fr}
  .score-grid{grid-template-columns:repeat(2,1fr)}
  .cover h1{font-size:20px}
}
</style>
</head>
<body>
<div class="wrap">

<!-- 封面 -->
<div id="cover" class="cover">
  <div class="cover-tag">医健行业专属 · 器械 · 药品 · 医服</div>
  <h1>您的企业，在AI转型赛道上<br>处于第几梯队？</h1>
  <p>集采持续、DRG落地、资本退潮——这轮周期里，率先完成AI转型的企业已经开始拉开差距。8道题，结束后获得针对您情况的3个具体行动建议。</p>
  <div class="cover-meta">
    <span>⏱ 约4分钟</span>
    <span>📋 8道题</span>
    <span>🎯 即时诊断</span>
  </div>
  <button class="start-btn" onclick="showSection('quiz')">开始诊断</button>
</div>

<!-- 问卷 -->
<div id="quiz" class="hidden">
  <div class="prog-bar"><div class="prog-fill" id="prog"></div></div>
  <div class="dim-tag" id="dim-tag"></div>
  <div id="q-area"></div>
  <div class="nav">
    <button class="nav-l" id="prev" onclick="go(-1)" disabled>← 上一题</button>
    <span class="step-ct" id="step-ct">1 / 8</span>
    <button class="nav-r" id="next" onclick="go(1)" disabled>下一题 →</button>
  </div>
</div>

<!-- 信息采集 -->
<div id="info" class="hidden">
  <div class="info-card">
    <div class="info-title">您的诊断报告已生成 ✓</div>
    <div class="info-sub">填写以下信息，解锁针对贵司的3个具体行动建议。信息仅用于本次诊断交流，不对外披露。</div>
    <div class="info-row">
      <label>您的姓名 *</label>
      <input type="text" id="f-name" placeholder="请输入姓名">
    </div>
    <div class="info-grid">
      <div class="info-row">
        <label>职位 *</label>
        <select id="f-role">
          <option value="">请选择</option>
          <option>CEO</option>
          <option>CTO</option>
          <option>COO</option>
          <option>其他高管</option>
        </select>
      </div>
      <div class="info-row">
        <label>细分赛道 *</label>
        <select id="f-track">
          <option value="">请选择</option>
          <option>医疗器械</option>
          <option>药品 / 生物制品</option>
          <option>医疗服务机构</option>
          <option>IVD / 体外诊断</option>
          <option>医疗信息化</option>
          <option>其他</option>
        </select>
      </div>
    </div>
    <div class="info-row">
      <label>企业名称 *</label>
      <input type="text" id="f-company" placeholder="请输入企业名称">
    </div>
    <div class="info-row">
      <label>微信号</label>
      <input type="text" id="f-wechat" placeholder="请输入微信号（便于联系）">
    </div>
    <div class="info-row">
      <label>企业年营收规模</label>
      <select id="f-revenue">
        <option value="">请选择</option>
        <option>1000万以下</option>
        <option>1000-5000万</option>
        <option>5000万-1亿</option>
        <option>1亿以上</option>
      </select>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitInfo()">查看我的3个行动建议 →</button>
    <div class="submit-status" id="submit-status"></div>
    <div class="skip-link" onclick="showResult()">暂时跳过，直接查看结果</div>
  </div>
</div>

<div id="contact-modal" class="modal-overlay" onclick="if(event.target===this)this.classList.remove('open')">

// ===== 状态 =====
const answers = new Array(8).fill(null);
let cur = 0;
let userInfo = {};

// ===== 页面切换 =====
function showSection(id) {
  ['cover','quiz','info','result'].forEach(s => {
    document.getElementById(s).classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
  window.scrollTo(0, 0);
  if (id === 'quiz') renderQ();
}

// ===== 渲染题目 =====
function renderQ() {
  const q = Qs[cur];
  document.getElementById('dim-tag').textContent = '模块 · ' + q.dim;
  document.getElementById('prog').style.width = ((cur + 1) / 8 * 100) + '%';
  document.getElementById('step-ct').textContent = (cur + 1) + ' / 8';
  document.getElementById('prev').disabled = cur === 0;
  document.getElementById('next').disabled = answers[cur] === null;
  document.getElementById('next').textContent = cur === 7 ? '查看报告 →' : '下一题 →';
  const L = ['A','B','C','D'];
  document.getElementById('q-area').innerHTML = `
    <div class="q-card">
      <div class="q-num">Q${cur + 1}</div>
      <div class="q-text">${q.text}</div>
      <div class="q-sub">${q.sub}</div>
      <div class="opts">${q.opts.map((o, i) => `
        <button class="opt${answers[cur] === i ? ' sel' : ''}" onclick="pick(${i})">
          <span class="opt-l">${L[i]}</span><span>${o}</span>
        </button>`).join('')}
      </div>
    </div>`;
}

function pick(i) {
  answers[cur] = i;
  renderQ();
}

function go(d) {
  if (d === 1 && answers[cur] === null) return;
  if (d === 1 && cur === 7) { showSection('info'); return; }
  cur = Math.max(0, Math.min(7, cur + d));
  renderQ();
}

// ===== 推送到飞书机器人 =====
async function submitToFeishu(info, scores, total, typeLabel, answerStr) {
  const now = new Date().toLocaleString('zh-CN');
  const text = [
    '📋 新诊断提交',
    '',
    `👤 姓名：${info.name || '-'}`,
    `💼 职位：${info.role || '-'}`,
    `🏢 企业：${info.company || '-'}`,
    `🏥 赛道：${info.track || '-'}`,
    `💰 营收：${info.revenue || '-'}`,
    '',
    `📊 诊断结果：${typeLabel}（${total}/24分）`,
    `   战略判断：${scores.strategy}/6　AI认知：${scores.ai}/6　组织就绪：${scores.org}/6　痛点清晰：${scores.pain}/6`,
    '',
    `📝 答题：${answerStr}`,
    `⏰ 时间：${now}`
  ].join('\n');

  const resp = await fetch(FEISHU_WEBHOOK, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ msg_type: 'text', content: { text } })
  });
  const data = await resp.json();
  if (data.code !== 0 && data.StatusCode !== 0) throw new Error(JSON.stringify(data));
  return true;
}

// ===== 提交信息 =====
async function submitInfo() {
  const name    = document.getElementById('f-name').value.trim();
  const role    = document.getElementById('f-role').value;
  const track   = document.getElementById('f-track').value;
  const company = document.getElementById('f-company').value.trim();
  if (!name || !role || !track || !company) {
    document.getElementById('submit-status').textContent = '请填写姓名、职位、赛道和企业名称';
    return;
  }
  userInfo = {
    name, role, track, company,
    revenue: document.getElementById('f-revenue').value
  };
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '提交中…';
  document.getElementById('submit-status').textContent = '正在提交数据…';

  try {
    const { scores, total, typeLabel, answerStr } = calcScores();
    await submitToFeishu(userInfo, scores, total, typeLabel, answerStr);
    document.getElementById('submit-status').textContent = '提交成功 ✓';
    setTimeout(() => showResult(), 600);
  } catch(e) {
    console.error(e);
    document.getElementById('submit-status').textContent = '网络异常，数据已本地保存，正在跳转…';
    btn.disabled = false;
    btn.textContent = '查看我的3个行动建议 →';
    setTimeout(() => showResult(), 1200);
  }
}

// ===== 计算得分 =====
function calcScores() {
  const L = ['A','B','C','D'];
  const v = i => answers[i] !== null ? answers[i] : 0;
  const scores = {
    strategy: v(0) + v(1),
    ai:       v(2) + v(3),
    org:      v(4) + v(5),
    pain:     v(6) + v(7)
  };
  const total = Object.values(scores).reduce((a, b) => a + b, 0);
  const typeLabel = total <= 8 ? '观望期' : total <= 16 ? '探索期' : '加速期';
  const answerStr = answers.map((a, i) => 'Q' + (i+1) + ':' + (a !== null ? L[a] : '-')).join('，');
  return { scores, total, typeLabel, answerStr };
}

function toggleAction(i) {

  const arrow = document.getElementById('arrow-' + i);

}

// 键盘快捷键
document.addEventListener('keydown', e => {

});
